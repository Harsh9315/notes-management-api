<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Management API</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">

        <header class="app-header">
            <h1>Notes Management API</h1>
            <p class="subtitle">
                Secure, clean, and organized day-by-day logging system with Node.js
            </p>
        </header>

        <main class="app-content">

            <!-- Create Note -->
            <section class="card form-section">
                <h2>Create New Log</h2>

                <form id="noteForm">

                    <div class="form-group">
                        <label for="noteDate">Select Date</label>
                        <input type="date" id="noteDate" required>
                    </div>

                    <div class="form-group">
                        <label for="noteText">Notes Content</label>
                        <textarea
                            id="noteText"
                            placeholder="Type your notes here..."
                            required
                        ></textarea>
                    </div>

                    <button type="submit" class="btn-primary">
                        Save Entry
                    </button>

                </form>
            </section>

            <!-- Saved Entries -->
            <section class="card notes-section">

                <h2>Saved Entries</h2>

                <div class="form-group">

                    <label for="filterDate">Filter by Date</label>

                    <div class="filter-row">

                        <input type="date" id="filterDate">

                        <button
                            type="button"
                            id="btnClearFilter">
                            Clear
                        </button>

                    </div>

                </div>

                <div id="notesList" class="notes-list">
                    <p class="no-notes">
                        No notes available.
                    </p>
                </div>

            </section>

        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
